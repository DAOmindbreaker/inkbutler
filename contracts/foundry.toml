[profile.default]
src        = "src"
out        = "out"
libs       = ["lib"]
test       = "test"
script     = "script"
cache_path = "cache"

solc_version      = "0.8.26"
evm_version       = "cancun"          # Ink Chain supports Cancun opcodes
optimizer         = true
optimizer_runs    = 200
via_ir            = false             # set true if hitting stack-too-deep

# Ink Sepolia
[rpc_endpoints]
ink_sepolia = "${INK_SEPOLIA_RPC}"
ink_mainnet = "${INK_MAINNET_RPC}"

[etherscan]
ink_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://explorer.inkonchain.com/api" }

[fmt]
line_length   = 100
tab_width     = 4
bracket_spacing = true

[fuzz]
runs = 1000
seed = "0x1337"

[invariant]
runs   = 256
depth  = 15
